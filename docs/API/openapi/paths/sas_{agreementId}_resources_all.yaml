parameters:
  - $ref: ../components/parameters/x-okapi-tenant.yaml
get:
  tags:
    - Agreements
  summary: Returns all resources in the internal KB associated with specified agreement
  operationId: getAgreementResourcesAll
  parameters:
    - $ref: ../components/parameters/agreementId.yaml
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../components/schemas/ErmResourceResults.yaml
              - $ref: ../components/schemas/ErmResourceResultsArray.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error
