get:
  summary: Get a specified package record
  operationId: getPackage
  parameters:
    - $ref: ../components/parameters/packageId.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Package.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error
put:
  summary: Update package record
  operationId: putPackage
  parameters:
    - $ref: ../components/parameters/packageId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Package.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Package.yaml
    '400':
      description: Bad request error
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error