description:  Supports retrieval of a deduplicated list of distinct, non-null source values from all Pkg (Package) records
parameters:
  - $ref: ../components/parameters/x-okapi-tenant.yaml
get:
  tags:
  - Packages
  summary: Get a list of deduplicated list of distinct, non-null source values from all Pkg (Package) records
  operationId: packageSources
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '500':
      description: Internal server error