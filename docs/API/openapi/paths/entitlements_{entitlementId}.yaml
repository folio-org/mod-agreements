get:
  summary: Get a specified entitlement record
  operationId: getEntitlement
  parameters:
    - $ref: ../components/parameters/entitlementId.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Entitlement.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error
put:
  summary: Update entitlement record
  operationId: putEntitlement
  parameters:
    - $ref: ../components/parameters/entitlementId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Entitlement.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Entitlement.yaml
    '400':
      description: Bad request error
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error  
delete:
  summary: Delete a specified entitlement record
  operationId: deleteEntitlement
  parameters:
    - $ref: ../components/parameters/entitlementId.yaml
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error