parameters:
  - $ref: ../components/parameters/x-okapi-tenant.yaml
get:
  tags:
  - Entitlement Log
  summary: Get a specified entitlement log entry record
  operationId: getEntitlementLogEntry
  parameters:
    - $ref: ../components/parameters/entitlementLogEntryId.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EntitlementLogEntry.yaml
