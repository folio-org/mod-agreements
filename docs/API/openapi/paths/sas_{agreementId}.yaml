get:
  summary: Get a specified agreement record
  operationId: getAgreement
  parameters:
    - $ref: ../components/parameters/agreementId.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Agreement.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error
put:
  summary: Update agreement record
  operationId: putAgreement
  parameters:
    - $ref: ../components/parameters/agreementId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Agreement.yaml
    required: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Agreement.yaml
    '400':
      description: Bad request error
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error  
delete:
  summary: Delete a specified agreement record
  operationId: deleteAgreement
  parameters:
    - $ref: ../components/parameters/agreementId.yaml
  responses:
    '204':
      description: No content
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '404':
      description: Not found error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/HttpError.yaml
    '500':
      description: Internal server error