        totalPages:
          type: integer
        totalRecords:
          type: integer
    Refdata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        value:
          type: string
    AlternateName:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
          readOnly: true
          description: Agreements that owns the alternate name
    AgreementContentType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        contentType:
          $ref: '#/components/schemas/Refdata'
    InternalContact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
        role:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        user:
          type: string
          format: uuid
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        orgsUuid:
          type: string
          format: uuid
        orgsUuid_object:
          type: object
    AgreementOrg:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner:
          type: object
          properties:
            id:
              type: string
              format: uuid
          readOnly: true
          description: Agreement that owns the organisation
        org:
          $ref: '#/components/schemas/Organisation'
        primaryOrg:
          type: boolean
          description: Whether this is the primary organisation for the agreement
          default: false
        note:
          type: string
          description: A note about this organisation's relationship to the agreement
        roles:
          type: array
          description: The roles this organisation plays in relation to the agreement
          items:
            type: object
            required:
              - id
              - role
            properties:
              id:
                type: string
                format: uuid
                readOnly: true
              owner:
                $ref: '#/components/schemas/AgreementOrg'
                readOnly: true
              role:
                description: The role (e.g. Content provider)
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/Refdata'
              note:
                type: string
    File:
      type: object
      properties:
