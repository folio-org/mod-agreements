            $ref: '#/components/schemas/LinkedAmendment'
        id:
          type: string
          format: uuid
        owner:
          type: string
          format: uuid
        remoteId:
          type: string
          format: uuid
        remoteId_object:
          type: object
        status:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
    Agreement:
      type: object
      required:
        - id
        - name
        - agreementStatus
        - periods
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        dateCreated:
          type: string
          format: date-time
          readOnly: true
        lastUpdated:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 255
          minLength: 1
        description:
          type: string
        agreementStatus:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        isPerpetual:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        reasonForClosure:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        renewalPriority:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        alternateNames:
          type: array
          items:
            $ref: '#/components/schemas/AlternateName'
        localReference:
          type: string
        vendorReference:
          type: string
        agreementContentTypes:
          type: array
          items:
            $ref: '#/components/schemas/AgreementContentType'
        periods:
          type: array
          items:
            type: object
            required:
              - startDate
            properties:
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date
              cancellationDeadline:
                type: string
                format: date
              periodStatus:
                type: string
              note:
                type: string
              id:
                type: string
                format: uuid
        startDate:
          type: string
          format: date
          readOnly: true
        endDate:
          type: string
          format: date
          readOnly: true
        cancellationDeadline:
          type: string
          format: date
          readOnly: true
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/InternalContact'
        orgs:
          type: array
          description: Organisations associated with the agreement
          items:
            $ref: '#/components/schemas/AgreementOrg'
        externalLicenseDocs:
          type: array
          items:
            $ref: '#/components/schemas/DocumentAttachment'
        supplementaryDocs:
          type: array
          items:
            $ref: '#/components/schemas/DocumentAttachment'
        linkedLicenses:
          type: array
          items:
            $ref: '#/components/schemas/LinkedLicense'
        usageDataProviders:
          type: array
          items:
            $ref: '#/components/schemas/UsageDataProvider'
        inwardRelationships:
          type: array
          items:
            $ref: '#/components/schemas/AgreementRelationship'
        outwardRelationships:
          type: array
          items:
            $ref: '#/components/schemas/AgreementRelationship'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        customProperties:
          type: object
          description: Custom properties (agreement supplementary properties) — keys are property names, values are arrays of property value instances
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/CustomPropertyValue'
    UsageDataProvider:
      type: object
      properties:
