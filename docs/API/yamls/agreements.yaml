openapi: 3.1.0
info:
  version: 7.3.0
  title: Folio ERM Agreements
  description: API for the Folio library services platform mod-agreements app
  contact:
    name: Knowledge Integration
    url: https://www.k-int.com
servers:
  - url: https://folio-snapshot-okapi.dev.folio.org
  - url: https://folio-snapshot-2-okapi.dev.folio.org
  - url: https://folio-etesting-snapshot-kong.ci.folio.org
security:
  - accessToken: []
  - okapiToken: []
paths:
  /erm/sas:
    description: Supports search and creation of Subscription Agreements. Note that internally the API uses 'SA' or 'Subscription Agreement', but externally the app uses 'Agreement' to describe these objects, and it is not required that they represent subscriptions
    parameters:
      - $ref: '#/components/parameters/x-okapi-tenant'
    get:
      tags:
        - Agreements
      summary: Get a set of subscription agreement (SA) aka Agreement records.
      operationId: getAgreements
      parameters:
        - $ref: '#/components/parameters/filters'
        - $ref: '#/components/parameters/match'
        - $ref: '#/components/parameters/term'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/stats'
        - $ref: '#/components/parameters/perPage'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AgreementResults'
                  - $ref: '#/components/schemas/AgreementResultsArray'
        '400':
          description: Bad request error
        '403':
          description: Forbidden
        '500':
          description: Internal server error
    post:
      tags:
        - Agreements
      summary: Create subscription agreement (SA) aka Agreement record
      operationId: postSA
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agreement'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agreement'
        '400':
          description: Bad request error
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /erm/sas/{agreementId}:
    parameters:
      - $ref: '#/components/parameters/x-okapi-tenant'
      - $ref: '#/components/parameters/agreementId'
    get:
      tags:
        - Agreements
      summary: Get a specified agreement record
      operationId: getAgreement
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agreement'
        '400':
          description: Bad request error
        '403':
          description: Forbidden
        '404':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpError'
        '500':
          description: Internal server error
    put:
      tags:
        - Agreements
      summary: Update agreement record
      operationId: putAgreement
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agreement'
        required: true
      responses:
