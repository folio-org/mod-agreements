components:
  securitySchemes:
    okapiToken:
      type: apiKey
      in: header
      name: x-okapi-token
    accessToken:
      type: apiKey
      in: cookie
      name: folioAccessToken
  parameters:
    x-okapi-tenant:
      in: header
      name: x-okapi-tenant
      required: true
      schema:
        type: string
    filters:
      in: query
      name: filters
      required: false
      schema:
        type: string
    match:
      in: query
      name: match
      required: false
      schema:
        type: string
    term:
      in: query
      name: term
      required: false
      schema:
        type: string
    sort:
      in: query
      name: sort
      required: false
      schema:
        type: string
    stats:
      in: query
      name: stats
      required: false
      schema:
        type: boolean
    perPage:
      in: query
      name: perPage
      required: false
      schema:
        type: integer
    offset:
      in: query
      name: offset
      required: false
      schema:
        type: integer
    page:
      in: query
      name: page
      required: false
      schema:
        type: integer
    agreementId:
      in: path
      name: agreementId
      description: UUID for an Agreement
      required: true
      schema:
        type: string
        format: uuid
    subset:
      in: path
      name: subset
      required: true
      schema:
        type: string
        enum:
          - current
          - all
    format:
      in: path
      name: format
      required: true
      schema:
        type: string
        enum:
          - json
          - kbart
    referenceId:
      in: query
      name: referenceId
      required: false
      schema:
        type: string
    resourceId:
      in: query
      name: resourceId
      required: false
      schema:
        type: string
    entitlementId:
      in: path
      name: entitlementId
      description: UUID for an Entitlement (Agreement line)
      required: true
      schema:
        type: string
        format: uuid
    entitlementLogEntryId:
      in: path
      name: entitlementLogEntryId
      description: UUID for an entitlement log entry
      required: true
      schema:
        type: string
        format: uuid
    packageId:
      in: path
      name: packageId
      description: UUID for a Package
      required: true
      schema:
        type: string
        format: uuid
    packageSubset:
      in: path
      name: packageSubset
      required: true
      schema:
        type: string
        enum:
          - current
          - dropped
          - future
          - all
    metadataId:
      in: path
      name: metadataId
      description: UUID for a PackageIngressMetadata record
      required: true
      schema:
        type: string
        format: uuid
    pciId:
      in: path
      name: pciId
      description: UUID for a PackageContentItem
      required: true
      schema:
        type: string
        format: uuid
    platformId:
      in: path
      name: platformId
      description: UUID for a Platform
      required: true
      schema:
        type: string
        format: uuid
    ptiId:
      in: path
      name: ptiId
      description: UUID for a PlatformTitleInstance
      required: true
      schema:
        type: string
        format: uuid
    titleId:
      in: path
      name: titleId
      description: UUID for a TitleInstance
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ResultsMeta:
