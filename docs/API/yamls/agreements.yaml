          type: string
          format: uuid
        contentType:
          type: string
        modified:
          type: string
          format: date-time
        name:
          type: string
        size:
          type: integer
    DocumentAttachment:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        dateCreated:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        location:
          type: string
        url:
          type: string
          format: uri
        note:
          type: string
        atType:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Refdata'
        fileUpload:
          $ref: '#/components/schemas/File'
    LinkedAmendment:
      type: object
      properties:
