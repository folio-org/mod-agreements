description: Supports search of platform records in the Agreements local knowledgebase
parameters:
  - $ref: ../components/parameters/x-okapi-tenant.yaml
get:
  tags:
  - Platforms
  summary: Get a set of platform records
  operationId: getPlatforms
  parameters:
    $ref: ../components/parameters/queryParameters.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../components/schemas/PlatformResults.yaml
              - $ref: ../components/schemas/PlatformResultsArray.yaml
    '400':
      description: Bad request error
    '403':
      description: Forbidden
    '500':
      description: Internal server error
