type: object
required:
  - id
  - name
  - agreementStatus
  - periods
properties:
  id:
    type: string
    format: uuid
    readOnly: true
  dateCreated:
    type: string
    format: date-time
    readOnly: true
  lastUpdated:
    type: string
    format: date-time
    readOnly: true
  name:
    type: string
    maxLength: 255
    minLength: 1
  description:
    type: string
  agreementStatus:
    oneOf:
      - type: string
      - $ref: ./Refdata.yaml
  isPerpetual:
    oneOf:
      - type: string
      - $ref: ./Refdata.yaml
  reasonForClosure:
    oneOf:
      - type: string
      - $ref: ./Refdata.yaml
  renewalPriority:
    oneOf:
      - type: string
      - $ref: ./Refdata.yaml
  alternateNames:
    type: array
    items:
      $ref: ./AlternateName.yaml
  localReference:
    type: string
  vendorReference:
    type: string
  agreementContentTypes:
    type: array
    items:
      $ref: ./AgreementContentType.yaml
  periods:
    type: array
    items:
      type: object
      required:
        - startDate
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        cancellationDeadline:
          type: string
          format: date
        periodStatus:
          type: string
        note:
          type: string
        id:
          type: string
          format: uuid
  startDate:
      type: string
      format: date
      readOnly: true
  endDate:
      type: string
      format: date
      readOnly: true
  cancellationDeadline:
      type: string
      format: date
      readOnly: true
  contacts:
    type: array
    items:
      $ref: ./InternalContact.yaml
  orgs:
    type: array
    description: Organisations associated with the agreement
    items:
      $ref: ./AgreementOrg.yaml
  externalLicenseDocs:
    type: array
    items:
      $ref: ./DocumentAttachment.yaml
  supplementaryDocs:
    type: array
    items:
      $ref: ./DocumentAttachment.yaml
  linkedLicenses:
    type: array
    items:
      $ref: ./LinkedLicense.yaml
  usageDataProviders:
    type: array
    items:
      $ref: ./UsageDataProvider.yaml
  inwardRelationships:
    type: array
    items:
      $ref: ./AgreementRelationship.yaml
  outwardRelationships:
    type: array
    items:
      $ref: ./AgreementRelationship.yaml
  tags:
    type: array
    items:
      $ref: ./Tag.yaml
  customProperties:
    type: object
    description: Custom properties (agreement supplementary properties) — keys are property names, values are arrays of property value instances
    additionalProperties:
      type: array
      items:
        $ref: ./CustomPropertyValue.yaml