name: SBOM Generation

on:
  push:
  pull_request:
  workflow_dispatch:

# Eventually we don't want this running on every push
#on:
#  push:
#    branches:
#      - main
#    tags:
#      - '*'
#  workflow_dispatch:

jobs:
  generate-sbom:
    permissions:
      contents: write
    uses: k-int/github-actions/.github/workflows/sbom-gradle.yml@main
    with:
      gradle_project_path: 'service'
    secrets:
      GITLAB_DEPLOY_USER: ${{ secrets.GITLAB_DEPLOY_USER }}
      GITLAB_DEPLOY_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}